<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Canvas App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  overflow: hidden;
}
h2, .controls {
  position: relative;
  z-index: 10;
}
.controls {
  padding: 10px;
  background: #222;
  position: relative;
  z-index: 10;
}

/* FULL SCREEN BACKGROUND */
#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* DRAW CANVAS */
#drawCanvas {
  position: absolute;
  left: 0;
  top: 0;
  z-index: 2;
  border: 2px solid white;
  background: #111; /* clean drawing area */
}

/* CONTAINER */
.container {
  position: relative;
  width: 700px;
  height: 450px;
  margin: 80px auto;
  z-index: 5;
}

button, select, input {
  margin: 5px;
  padding: 5px;
}
</style>
</head>

<body>

<h2>🎨 Advanced Drawing + Text Canvas App</h2>
<div class="controls">
  Color: <input type="color" id="colorPicker">
  Brush Size: <input type="range" id="brushSize" min="1" max="30" value="5">

  Brush:
  <select id="brushType">
    <option value="round">Round</option>
    <option value="square">Square</option>
    <option value="glow">Glow</option>
  </select>

  <button onclick="setDrawMode()">Draw</button>
  <button onclick="setTextMode()">Text</button>
  <button onclick="setEraser()">Eraser</button>
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="saveImage()">Save</button>
</div>

<div class="container">
  <canvas id="drawCanvas" width="700" height="450"></canvas>
</div>

<!-- ✅ BACKGROUND CANVAS OUTSIDE -->
<canvas id="bgCanvas"></canvas>

<script>

/* =========================
   BACKGROUND PARTICLES (OUTSIDE CANVAS)
========================= */

const bg = document.getElementById("bgCanvas");
const bgCtx = bg.getContext("2d");

function resizeBG() {
  bg.width = window.innerWidth;
  bg.height = window.innerHeight;
}
resizeBG();
window.addEventListener("resize", resizeBG);

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2 + 1,
    speed: Math.random() * 1 + 0.3
  });
}

function animateBG() {
  bgCtx.fillStyle = "#111";
  bgCtx.fillRect(0, 0, bg.width, bg.height);

  particles.forEach(p => {
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = "rgba(255,255,255,0.5)";
    bgCtx.fill();

    p.y += p.speed;

    if (p.y > bg.height) {
      p.y = 0;
      p.x = Math.random() * bg.width;
    }
  });

  requestAnimationFrame(animateBG);
}
animateBG();

/* =========================
   DRAWING CANVAS
========================= */

const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");

let painting = false;
let color = "#ffffff";
let size = 5;
let brushType = "round";
let eraser = false;

let mode = "draw";
let textX = 50;
let textY = 50;
let typedText = "";

canvas.addEventListener("mousedown", (e) => {
  if (mode === "draw") {
    painting = true;
    ctx.beginPath();
  }
});

canvas.addEventListener("mouseup", () => {
  painting = false;
  ctx.beginPath();
});

canvas.addEventListener("mousemove", draw);

function draw(e) {
  if (!painting || mode !== "draw") return;

  ctx.lineWidth = size;
  ctx.strokeStyle = eraser ? "#111" : color;

  ctx.lineCap = (brushType === "square") ? "butt" : "round";

  ctx.shadowBlur = (brushType === "glow") ? 15 : 0;
  ctx.shadowColor = color;

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

/* TEXT */

canvas.addEventListener("click", (e) => {
  if (mode === "text") {
    textX = e.offsetX;
    textY = e.offsetY;
    typedText = "";
    redrawText();
  }
});

document.addEventListener("keydown", (e) => {
  if (mode !== "text") return;

  if (e.key === "Backspace") typedText = typedText.slice(0, -1);
  else if (e.key === "Enter") {
    textY += size * 3;
    typedText = "";
  }
  else if (e.key.length === 1) typedText += e.key;

  redrawText();
});

function redrawText() {
  ctx.fillStyle = color;
  ctx.font = `${size * 3}px Arial`;
  ctx.fillText(typedText, textX, textY);
}

/* CONTROLS */

document.getElementById("colorPicker").addEventListener("input", e => {
  color = e.target.value;
  eraser = false;
});

document.getElementById("brushSize").addEventListener("input", e => {
  size = e.target.value;
});

document.getElementById("brushType").addEventListener("change", e => {
  brushType = e.target.value;
});

function setDrawMode() { mode = "draw"; }
function setTextMode() { mode = "text"; }
function setEraser() { eraser = true; }

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function saveImage() {
  const link = document.createElement("a");
  link.download = "canvas-art.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
